name: Update candidate profile from CV

on:
  push:
    paths:
      - "cv/**"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Parse CV into candidate profile
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/parse-cv.mjs

      - name: Commit updated candidate profile (if changed)
        run: |
          git config user.name "job-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/candidate-profile.json
          git diff --quiet --cached || git commit -m "Regenerate candidate profile from CV"
          git push
